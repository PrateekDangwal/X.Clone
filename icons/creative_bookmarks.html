
<style>
*{box-sizing:border-box;margin:0;padding:0}
.page{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 3rem;font-family:var(--font-sans)}
.hero{text-align:center;margin-bottom:2rem}
.hero-icon{width:52px;height:52px;border-radius:16px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;border:0.5px solid #AFA9EC}
.hero-icon i{font-size:24px;color:#3C3489}
.hero h1{font-size:22px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.hero p{font-size:13px;color:var(--color-text-secondary)}
.add-bar{display:flex;gap:10px;align-items:center;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:99px;padding:6px 6px 6px 18px;width:100%;max-width:520px;margin-bottom:2rem}
.add-bar input{flex:1;border:none;outline:none;background:transparent;font-size:14px;color:var(--color-text-primary)}
.add-bar input::placeholder{color:var(--color-text-tertiary)}
.add-bar .name-inp{width:130px;border-left:0.5px solid var(--color-border-tertiary);padding-left:12px;flex:none}
.btn-save{background:#534AB7;color:#EEEDFE;border:none;border-radius:99px;padding:7px 18px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.btn-save:hover{background:#3C3489}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;width:100%;max-width:620px}
.card{border-radius:16px;padding:1rem 1rem 0.85rem;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);display:flex;flex-direction:column;gap:10px;position:relative;transition:border-color .15s}
.card:hover{border-color:var(--color-border-primary)}
.card-accent{height:4px;border-radius:99px;width:32px}
.card-body{flex:1}
.card-name{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px;word-break:break-word}
.card-url{font-size:12px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-footer{display:flex;align-items:center;justify-content:space-between;border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:2px}
.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:16px;padding:2px;border-radius:6px;display:flex;align-items:center}
.icon-btn:hover{color:var(--color-text-primary);background:var(--color-background-secondary)}
.del-btn:hover{color:#A32D2D}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--color-text-secondary);font-size:13px;width:100%;max-width:620px}
.empty i{font-size:32px;display:block;margin-bottom:8px;opacity:.3}
.count-badge{font-size:12px;background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5;border-radius:99px;padding:2px 10px;margin-left:8px;font-weight:500}
</style>

<div class="page">
  <h2 style="position:absolute;left:-9999px">Creative bookmarks page — save and manage your links</h2>

  <div class="hero">
    <div class="hero-icon"><i class="ti ti-bookmark" aria-hidden="true"></i></div>
    <h1>My Bookmarks <span class="count-badge" id="cnt">0</span></h1>
    <p>Your personal link collection, always at hand</p>
  </div>

  <div class="add-bar">
    <input type="url" id="inp-url" placeholder="Paste a URL…" />
    <input type="text" id="inp-name" class="name-inp" placeholder="Name" />
    <button class="btn-save" onclick="addBM()">
      <i class="ti ti-plus" aria-hidden="true"></i> Add
    </button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">
    <i class="ti ti-bookmark" aria-hidden="true"></i>
    No bookmarks yet — add your first link above
  </div>
</div>

<script>
const COLORS = [
  {accent:'#7F77DD',bg:'#EEEDFE',text:'#3C3489',tag:'purple'},
  {accent:'#1D9E75',bg:'#E1F5EE',text:'#085041',tag:'teal'},
  {accent:'#D4537E',bg:'#FBEAF0',text:'#72243E',tag:'pink'},
  {accent:'#378ADD',bg:'#E6F1FB',text:'#0C447C',tag:'blue'},
  {accent:'#EF9F27',bg:'#FAEEDA',text:'#633806',tag:'amber'},
  {accent:'#D85A30',bg:'#FAECE7',text:'#712B13',tag:'coral'},
];
let idx=0;
let bms=[];
try{bms=JSON.parse(localStorage.getItem('cbm2')||'[]')}catch(e){}
function save(){try{localStorage.setItem('cbm2',JSON.stringify(bms))}catch(e){}}
function host(url){try{return new URL(url).hostname.replace('www.','')}catch(e){return url}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function render(){
  const g=document.getElementById('grid');
  const em=document.getElementById('empty');
  document.getElementById('cnt').textContent=bms.length;
  if(!bms.length){g.innerHTML='';em.style.display='block';return}
  em.style.display='none';
  g.innerHTML=bms.map((b,i)=>{
    const c=COLORS[b.ci%COLORS.length];
    return `<div class="card">
      <div class="card-accent" style="background:${c.accent}"></div>
      <div class="card-body">
        <div class="card-name">${esc(b.name)}</div>
        <div class="card-url">${esc(host(b.url))}</div>
      </div>
      <div class="card-footer">
        <span class="tag" style="background:${c.bg};color:${c.text};border:0.5px solid ${c.accent}40">${c.tag}</span>
        <div style="display:flex;gap:4px">
          <button class="icon-btn" onclick="openLink('${b.url.replace(/'/g,"\\'")}')" aria-label="Open link" title="Open">
            <i class="ti ti-external-link" aria-hidden="true"></i>
          </button>
          <button class="icon-btn del-btn" onclick="delBM(${i})" aria-label="Delete bookmark" title="Delete">
            <i class="ti ti-trash" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function addBM(){
  let url=document.getElementById('inp-url').value.trim();
  const name=document.getElementById('inp-name').value.trim();
  if(!url)return document.getElementById('inp-url').focus();
  if(!url.startsWith('http'))url='https://'+url;
  bms.unshift({url,name:name||host(url),ci:idx++});
  save();render();
  document.getElementById('inp-url').value='';
  document.getElementById('inp-name').value='';
}
function delBM(i){bms.splice(i,1);save();render();}
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter')addBM()});
document.getElementById('inp-url').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-name').focus()});
render();
</script>
